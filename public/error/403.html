<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Access Restricted · SkiCycleRun</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        --color-bg: #f8fafc;
        --color-card: #ffffff;
        --color-text: #1e293b;
        --color-muted: #64748b;
        --color-accent: #2563eb;
        --color-border: #e2e8f0;
        --color-badge-bg: #dbeafe;
        --color-badge-text: #1e40af;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-bg: #0f172a;
          --color-card: #1e293b;
          --color-text: #f1f5f9;
          --color-muted: #94a3b8;
          --color-accent: #60a5fa;
          --color-border: #334155;
          --color-badge-bg: #1e3a5f;
          --color-badge-text: #93c5fd;
        }
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--color-bg);
        color: var(--color-text);
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }
      .card {
        background: var(--color-card);
        border: 1px solid var(--color-border);
        border-radius: 1rem;
        padding: 2.5rem 2rem;
        max-width: 480px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      }
      .logo {
        display: block;
        margin: 0 auto 1.5rem;
        height: 48px;
        width: auto;
      }
      .code {
        font-size: 4rem;
        font-weight: 800;
        letter-spacing: -2px;
        color: var(--color-accent);
        line-height: 1;
        margin-bottom: 0.5rem;
      }
      .title {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
      }
      .desc {
        font-size: 0.95rem;
        color: var(--color-muted);
        line-height: 1.6;
        margin-bottom: 1.5rem;
      }
      .badge {
        display: inline-block;
        background: var(--color-badge-bg);
        color: var(--color-badge-text);
        font-size: 0.75rem;
        font-weight: 600;
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        margin-bottom: 1.75rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .actions {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      .btn {
        display: inline-block;
        padding: 0.6rem 1.4rem;
        border-radius: 0.5rem;
        font-size: 0.9rem;
        font-weight: 600;
        text-decoration: none;
        transition: opacity 0.15s;
      }
      .btn:hover {
        opacity: 0.85;
      }
      .btn-primary {
        background: var(--color-accent);
        color: #ffffff;
      }
      .btn-ghost {
        border: 1px solid var(--color-border);
        color: var(--color-text);
      }
      .footer-note {
        margin-top: 2rem;
        font-size: 0.78rem;
        color: var(--color-muted);
      }
      .footer-note a {
        color: var(--color-accent);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/SkiCycleRun.svg" alt="SkiCycleRun" class="logo" />

      <div class="code">403</div>
      <div class="title">Access Restricted</div>
      <span class="badge">Geo / Permission Block</span>

      <p class="desc">
        You are not permitted to view this content.
        Your region, your network, or your bot traffic is explicitly blocked by our access policy.
        This service does not accept visitors or bots from your location.
      </p>

    </div>
  </body>
</html>
